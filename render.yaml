# Render Blueprint for Safi Loans.
# Render's default Blueprint filename is render.yaml at the repository root.
services:
  - type: web
    name: safi-loans-api
    runtime: python
    rootDir: backend
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate --noinput && gunicorn safi_api.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: safi-loans-api.onrender.com
      - key: DJANGO_TIME_ZONE
        value: Africa/Nairobi
      - key: DATABASE_URL
        sync: false
      - key: DB_SSLMODE
        value: require
      - key: DB_CONNECT_TIMEOUT
        value: "30"
      - key: DB_CONN_MAX_AGE
        value: "0"
      - key: DB_CONN_HEALTH_CHECKS
        value: "False"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: https://safi-loans.onrender.com
      - key: DJANGO_EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend

  - type: web
    name: safi-loans
    runtime: static
    buildCommand: cd safi-loans && npm ci && npm run build
    staticPublishPath: safi-loans/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://safi-loans-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
